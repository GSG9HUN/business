name: Enforce Branch Naming

on:
  push:
    branches-ignore:
      - main
      - staging
      - staging-trunk

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [[ ! "$BRANCH_NAME" =~ ^(feature|bugfix|refactor)/.+$ ]]; then
            echo "ERROR: Invalid branch name '$BRANCH_NAME'. Use 'feature/{name}', 'bugfix/{name}', or 'refactor/{name}'"
            exit 1
          fi
