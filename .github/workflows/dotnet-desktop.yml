name: .NET Core DC Bot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Clean
      run: |
        Remove-Item -Recurse -Force bin,obj -ErrorAction SilentlyContinue

    - name: Restore
      run: dotnet restore ".\DC bot.sln"

    - name: Build ${{ matrix.configuration }}
      run: dotnet build --configuration ${{ matrix.configuration }} --no-restore

    - name: Test unit (Debug only)
      if: matrix.configuration == 'Debug'
      env:
        BOT_PREFIX: "!"
        DISCORD_TOKEN: "ci-dummy-token"
        LAVALINK_HOSTNAME: "localhost"
        LAVALINK_PASSWORD: "ci-dummy-password"
        LAVALINK_PORT: "2333"
        LAVALINK_SECURED: "false"
      run: dotnet test ".\DC bot tests\DC bot tests.csproj" --filter "Category=Unit" --logger trx --results-directory TestResults

    - name: Upload unit tests
      if: always() && matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v4
      with:
        name: Unit-Test-Results-${{ matrix.configuration }}
        path: TestResults
        if-no-files-found: ignore

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Docker diagnostics
      run: docker version

    - name: Restore
      run: dotnet restore "./DC bot.sln"

    - name: Build Debug
      run: dotnet build "./DC bot.sln" --configuration Debug --no-restore

    - name: Test integration
      env:
        BOT_PREFIX: "!"
        DISCORD_TOKEN: "ci-dummy-token"
        LAVALINK_HOSTNAME: "localhost"
        LAVALINK_PASSWORD: "ci-dummy-password"
        LAVALINK_PORT: "2333"
        LAVALINK_SECURED: "false"
      run: dotnet test "./DC bot tests/DC bot tests.csproj" --configuration Debug --no-build --filter "Category=Integration" --logger trx --results-directory TestResults

    - name: Upload integration tests
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Integration-Test-Results
        path: TestResults
        if-no-files-found: ignore
