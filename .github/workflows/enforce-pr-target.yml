name: Enforce PR Target

on:
  pull_request:
    branches:
      - '**'

jobs:
  check-pr-target:
    runs-on: ubuntu-latest
    steps:
      - name: Require staging-trunk as PR target
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"

          if [ "$TARGET_BRANCH" = "staging-trunk" ]; then
            exit 0
          fi

          if [ "$TARGET_BRANCH" = "main" ] && [ "$HEAD_BRANCH" = "staging-trunk" ] && [ "$PR_AUTHOR" = "github-actions[bot]" ]; then
            echo "Allowing automated recovery PR from staging-trunk to main."
            exit 0
          fi

          echo "ERROR: Pull requests must target 'staging-trunk'. Current target: '$TARGET_BRANCH'."
          exit 1
